name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root --password=password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies (if any)
        run: |
          if [ -f pnpm-lock.yaml ] || [ -f package.json ]; then
            pnpm install --frozen-lockfile
          else
            echo "No pnpm project detected at root; skipping install."
          fi

      - name: Generate Prisma Client (if prisma exists)
        env:
          DATABASE_URL: "mysql://root:password@127.0.0.1:3306/test_db"
        run: |
          if [ -f package.json ] && npx --yes prisma -v >/dev/null 2>&1; then
            pnpm prisma generate || true
          else
            echo "Prisma not detected; skipping generate."
          fi

      - name: Run Linter (if script exists)
        run: |
          if [ -f package.json ] && pnpm -s run | grep -q "lint"; then
            pnpm run lint
          else
            echo "No lint script; skipping."
          fi

      - name: Run E2E Tests (if script exists)
        env:
          DATABASE_URL: "mysql://root:password@127.0.0.1:3306/test_db"
        run: |
          if [ -f package.json ] && pnpm -s run | grep -q "test:e2e"; then
            pnpm run test:e2e
          else
            echo "No test:e2e script; skipping."
          fi
