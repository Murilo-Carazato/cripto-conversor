name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root --password=password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies (workspaces)
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma Client (API)
        working-directory: apps/api
        env:
          DATABASE_URL: "mysql://root:password@127.0.0.1:3306/test_db"
        run: |
          if [ -f package.json ]; then
            pnpm prisma:generate || true
          fi

      - name: Typecheck (workspaces)
        run: pnpm -r --if-present typecheck

      - name: Lint (workspaces)
        run: pnpm -r --if-present lint

      - name: Run Tests (workspaces)
        env:
          # Ensures API tests can connect if they need DB
          DATABASE_URL: "mysql://root:password@127.0.0.1:3306/test_db"
        run: pnpm -r --if-present test

      - name: Docker build
        run: docker compose build
