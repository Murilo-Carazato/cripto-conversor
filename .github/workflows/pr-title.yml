name: PR Title Lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read
  contents: read

jobs:
  conventional-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title convention
        uses: actions/github-script@v7
        with:
          script: |
            const core = require('@actions/core');
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed('Este workflow só deve rodar em eventos de pull_request.');
              return;
            }
            const title = pr.title || '';
            const types = ['feat','fix','chore','docs','style','refactor','perf','test','ci','build','revert'];
            const typesPattern = types.join('|');
            const re = new RegExp(`^(${typesPattern})(\\([a-z0-9-]+\\))?:\\s.+`, 'i');
            if (!re.test(title)) {
              core.setFailed('Use um título descritivo após o tipo. Ex: feat(api): adiciona rota /convert');
            }
